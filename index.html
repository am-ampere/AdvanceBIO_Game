<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AdvanceBIO Matching Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        .screen { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; }
        
        /* หน้าจอเริ่มต้น */
        #start-screen { display: block; background-image: url('BG_First.jpg'); }
        #start-btn { position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; width: 200px; }
        
        /* หน้าจอเกม */
        #game-screen { display: none; background-image: url('BG_Playgame.jpg'); }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <img id="start-btn" src="btn-start.png" onclick="startGame()">
    </div>

    <div id="game-screen" class="screen">
        </div>

    <script>
        function startGame() {
            // ตรวจสอบว่าฟังก์ชันทำงานหรือไม่โดยการซ่อนหน้าแรกและโชว์หน้าเกม
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            console.log("Game Started");
        }
    </script>
</body>
</html>
