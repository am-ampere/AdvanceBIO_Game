<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AdvanceBIO Memory Game - Production</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        .screen { position: absolute; width: 100vw; height: 100vh; background-size: 100% 100%; display: none; }

        /* หน้าที่ 1 */
        #screen-1 { display: block; background-image: url('assets/BG_First.jpg'); }
        #btn-start { position: absolute; top: 65vh; left: 50vw; transform: translateX(-50%); width: 15vw; cursor: pointer; }

        /* หน้าที่ 2 */
        #screen-2 { background-image: url('assets/BG_start.jpg'); }
        #txt-gamestart { position: absolute; top: 50vh; left: 50vw; transform: translate(-50%, -50%); width: 40vw; display: none; }

        /* หน้าที่ 3: เกม (แก้ 1, 2, 3, 5 ครบ) */
        #screen-3 { background-image: url('assets/BG_Playgame.jpg'); }
        #btn-home { position: absolute; top: 3vh; right: 3vw; width: 5vw; z-index: 20; cursor: pointer; }
        
        /* แก้ไข 1: วิดีโอพื้นดำ */
        #bear-action-play { position: absolute; bottom: 2vh; right: 2vw; width: 18vw; object-fit: cover; }
        
        /* แก้ไข 2: หลอดเวลาให้ซ้อนกัน */
        #timer-container { position: absolute; top: 3vh; left: 50vw; transform: translateX(-50%); width: 30vw; height: 6vh; display: flex; align-items: center; }
        #time-bar-bg { position: absolute; width: 100%; z-index: 1; }
        #time-bar-color { position: absolute; height: 60%; left: 0; z-index: 2; background: url('assets/time-bar-color.png'); background-size: 100% 100%; transition: width 0.1s; }
        #bear-timer-head { position: absolute; height: 120%; z-index: 3; transition: left 0.1s; }

        /* แก้ไข 3: ออร่าให้พอดี */
        #grid { position: absolute; top: 22vh; left: 50vw; transform: translateX(-50%); width: 75vw; display: grid; grid-template-columns: repeat(6, 1fr); gap: 1.5vh; }
        .card-container { perspective: 1000px; aspect-ratio: 1/1; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; object-fit: contain; }
        .card-front { transform: rotateY(180deg); }
        .aura { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 5; pointer-events: none; }

        #screen-win, #screen-lose { background-size: cover; }
    </style>
</head>
<body>

    <div id="screen-1" class="screen"><img id="btn-start" src="assets/btn-start.png" onclick="goToStartScreen()"></div>
    <div id="screen-2" class="screen"><img id="txt-gamestart" src="assets/txt-gamestart.png"></div>
    <div id="screen-3" class="screen">
        <img id="btn-home" src="assets/btn-home.png" onclick="location.reload()">
        <video id="bear-action-play" src="assets/bear-action.mp4" loop muted autoplay></video>
        <div id="timer-container">
            <img id="time-bar-bg" src="assets/time-bar-bg.png">
            <div id="time-bar-color"></div>
            <img id="bear-timer-head" src="assets/bear-timer-head.png">
        </div>
        <div id="grid"></div>
    </div>

</html>
