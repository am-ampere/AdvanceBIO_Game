<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AdvanceBIO Memory Game</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #screen { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* หน้าเมนูเริ่มเกม */
        #start-screen { background: url('assets/BG_Playgame.jpg') center/cover; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; }

        /* หน้าเล่นเกม */
        #game-container { display: none; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .card { width: 100px; height: 100px; cursor: pointer; object-fit: contain; background: white; }
        
        #timer { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; }
    </style>
</head>
<body>

    <div id="screen">
        <div id="start-screen">
            <h1>AdvanceBIO Memory Game</h1>
            <button onclick="startGame()">START GAME</button>
        </div>

        <div id="timer" style="display:none;">Time: 60s</div>
        <div id="game-container"></div>
    </div>

    <script>
        const audio = { bgm: new Audio('assets/soundgame.mp3'), click: new Audio('assets/click.mp3') };
        let timeLeft = 60;
        let timerInterval;

        function startGame() {
            // 1. สลับหน้าจอ
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'grid';
            document.getElementById('timer').style.display = 'block';

            // 2. เริ่มเสียง
            audio.bgm.loop = true;
            audio.bgm.play();

            // 3. เริ่มจับเวลา
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
                if(timeLeft <= 0) { clearInterval(timerInterval); alert('Game Over!'); location.reload(); }
            }, 1000);

            // 4. สร้างและสับการ์ด
            createCards();
        }

        function createCards() {
            const cardFiles = ['1.png', '1.png', '2.png', '2.png']; // ใส่ชื่อไฟล์ทั้งหมดของคุณที่นี่
            cardFiles.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('game-container');
            cardFiles.forEach(file => {
                const img = document.createElement('img');
                img.src = 'assets/card_back.png';
                img.className = 'card';
                img.onclick = () => { audio.click.play(); img.src = 'assets/' + file; };
                grid.appendChild(img);
            });
        }
    </script>
</body>
</html>
