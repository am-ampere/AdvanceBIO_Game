<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdvanceBIO Idle Screen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            cursor: none;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <video id="idleVideo" muted playsinline></video>

    <script>
        const videos = [
            'assets/02_Monitor_Video_Straw.mp4',
            'assets/06_Monitor_Video_postal bag.mp4',
            'assets/23_Monitor_Video_CupMTO.mp4',
            'assets/26_Monitor_Video_food box.mp4',
            'assets/27_Monitor_Video_MAVE.mp4',
        ];

        let lastIndex = -1;

        function playRandom() {
            let index;
            // ไม่เล่นคลิปเดิมซ้ำติดกัน
            do {
                index = Math.floor(Math.random() * videos.length);
            } while (index === lastIndex && videos.length > 1);
            lastIndex = index;

            const video = document.getElementById('idleVideo');
            video.src = videos[index];
            video.play();
        }

        const video = document.getElementById('idleVideo');

        // เมื่อคลิปจบ → เล่นคลิปใหม่แบบ random
        video.addEventListener('ended', playRandom);

        // เริ่มเล่นคลิปแรก
        playRandom();

        // แตะ/คลิกที่ไหนก็ได้ → กลับไปหน้าเกม
        document.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        document.addEventListener('touchstart', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
