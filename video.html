<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdvanceBIO Idle Screen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            cursor: none;
        }
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            display: block; 
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="idleVideo">
        <source src="assets/Test.mp4" type="video/mp4">
    </video>
    <script>
        // แตะหรือคลิกที่ไหนก็ได้ → กลับไปหน้าเกม
        document.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        document.addEventListener('touchstart', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
