<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdvanceBIO Idle Screen</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        /* จัดวิดีโอให้เต็มจอแนวตั้ง (ตามโจทย์ของคุณ) */
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            display: block; 
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="idleVideo">
        <source src="assets/bear-action.mp4" type="video/mp4">
        เบราว์เซอร์ของคุณไม่รองรับวิดีโอ
    </video>

    <script>
        // แตะหน้าจอที่ไหนก็ได้เพื่อเริ่มเกมใหม่ (ดีดไป index.html)
        document.onclick = () => {
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
